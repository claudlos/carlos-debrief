<!DOCTYPE html>
<html lang="en" data-theme="github-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics · Carlos's Debrief</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="assets/themes.css">
<script src="assets/theme-switcher.js" defer></script>
<style>
  :root{--bg-card:var(--bg-elevated);--border-card:var(--border-soft)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);line-height:1.55;padding:0 0 64px}
  .head{text-align:center;padding:44px 20px 24px;background:linear-gradient(180deg,var(--bg-elevated),var(--bg));border-bottom:1px solid var(--border-soft)}
  .head h1{
    font-size:1.9em;margin-bottom:6px;
    background:linear-gradient(135deg,var(--accent),var(--accent-purple));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .head a{color:var(--text-muted);font-size:.88em;text-decoration:none;margin:0 6px}
  .head a:hover{color:var(--accent)}
  .wrap{max-width:980px;margin:0 auto;padding:24px 20px}

  .section-label{
    font-size:.78em;text-transform:uppercase;letter-spacing:.07em;
    color:var(--text-subtle);font-family:var(--font-mono);
    margin:28px 0 12px;
  }
  .curated-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
  .curated{
    display:block;background:var(--bg-elevated);
    border:1px solid var(--border);border-radius:10px;padding:14px 16px;
    color:var(--text);text-decoration:none;
    transition:border-color .15s,transform .15s,box-shadow .15s;
  }
  .curated:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-card)}
  .curated .name{color:var(--text-bright);font-weight:600;margin-bottom:2px}
  .curated .desc{color:var(--text-muted);font-size:.82em}
  .curated .count{color:var(--accent);font-size:.72em;font-family:var(--font-mono);margin-top:6px}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
  .chip{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:6px 14px;font-size:.85em;cursor:pointer;font-family:inherit}
  .chip:hover,.chip.active{border-color:var(--accent);color:var(--accent)}
  .chip .n{color:var(--text-subtle);margin-left:6px}

  h2.topic{font-size:1.25em;color:var(--text-bright);margin:30px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border-soft)}
  .row{padding:9px 0;border-bottom:1px solid #1a1f26}
  .row a{color:var(--text);text-decoration:none;font-size:.95em}
  .row a:hover{color:var(--accent)}
  .row .meta{color:var(--text-subtle);font-size:.76em;margin-top:2px;font-family:var(--font-mono)}
  .row .meta a{color:var(--text-subtle)}
  .hidden{display:none}
  .empty{color:var(--text-subtle);text-align:center;padding:40px}
</style>
</head>
<body>
<div class="head">
  <h1>🗂️ Browse by topic</h1>
  <a href="index.html">← all debriefs</a> ·
  <a href="research-feed.html">research feed</a> ·
  <a href="news-feed.html">news feed</a> ·
  <a href="top-500.html">top 500</a> ·
  <a href="search.html">search</a> ·
  <a href="insights.html">insights</a>
</div>
<div class="wrap">

  <div class="section-label">// curated topic pages</div>
  <div class="curated-grid" id="curated"></div>

  <div class="section-label">// by source group (live filter)</div>
  <div class="chips" id="chips"></div>
  <div id="sections"><div class="empty">Loading…</div></div>

</div>
<script>
const chipsEl = document.getElementById('chips'), secEl = document.getElementById('sections');
const curatedEl = document.getElementById('curated');
function el(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}

const CURATED = [
  ['topics/security.html',       'Security & Cybersecurity', 'Vulns, CVEs, malware, SBOM, supply chain'],
  ['topics/hacking.html',        'Hacking & Pen Testing',    'Red-team, exploits, bug bounty, CTF'],
  ['topics/ai-safety.html',      'AI Safety & Guardrails',   'Alignment, jailbreaks, content moderation'],
  ['topics/coding.html',         'Coding & Compilers',       'Formal verification, type systems, program repair'],
  ['topics/oss.html',            'Open-Source Ecosystem',    'FOSS, licensing, copyleft'],
  ['topics/decentralized.html',  'Decentralized Networks',   'P2P, gossip, distributed systems, consensus'],
  ['topics/networking.html',     'Networking & Protocols',   'TCP, QUIC, BGP, SDN, wireguard, mesh'],
  ['topics/quantum.html',        'Quantum & Zero-Point Energy', 'Qubits, ZPE, Casimir, vacuum fluctuations'],
  ['topics/education.html',      'Educational Systems',      'MOOCs, adaptive learning, pedagogy'],
];
fetch('index.json').then(r=>r.json()).then(data=>{
  const counts = {};
  data.forEach(db => db.items.forEach(it => { counts[it.g] = (counts[it.g]||0)+1; }));

  // Render curated cards
  CURATED.forEach(([href, name, desc]) => {
    const a = el('a','curated',null);
    a.href = href;
    const c = el('div','name', name);
    const d = el('div','desc', desc);
    a.appendChild(c); a.appendChild(d);
    curatedEl.appendChild(a);
  });

  // Live filter by source group
  const byTopic = {};
  data.forEach(db => db.items.forEach(it => {
    (byTopic[it.g] = byTopic[it.g] || []).push({t:it.t,l:it.l,d:db.d,p:db.p});
  }));
  const topics = Object.keys(byTopic).sort((a,b)=>byTopic[b].length-byTopic[a].length);
  const all = el('div','chip active','All'); all.dataset.topic='*'; chipsEl.appendChild(all);
  topics.forEach(tp=>{ const c=el('div','chip',tp); const n=el('span','n','('+byTopic[tp].length+')'); c.appendChild(n); c.dataset.topic=tp; chipsEl.appendChild(c); });

  function draw(filter){
    secEl.textContent='';
    topics.filter(tp=>filter==='*'||tp===filter).forEach(tp=>{
      secEl.appendChild(el('h2','topic',`${tp} · ${byTopic[tp].length}`));
      byTopic[tp].slice(0,120).forEach(it=>{
        const row=el('div','row');
        const a=el('a',null,it.t); a.href=it.l; a.target='_blank'; a.rel='noopener'; row.appendChild(a);
        const m=el('div','meta'); m.appendChild(el('span',null,it.d+' · '));
        const dl=el('a',null,'debrief →'); dl.href=it.p; m.appendChild(dl);
        row.appendChild(m); secEl.appendChild(row);
      });
    });
  }
  chipsEl.addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return;
    [...chipsEl.children].forEach(x=>x.classList.remove('active')); c.classList.add('active'); draw(c.dataset.topic); });
  draw('*');
}).catch(()=>{ secEl.textContent=''; secEl.appendChild(el('div','empty','Could not load the topic index.')); });
</script>
</body>
</html>
